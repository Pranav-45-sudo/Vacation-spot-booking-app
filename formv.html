<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <title>Villa Booking Form</title>
    <style>
        body { background-image:url('../../Static Folder/core/villablur.png');
            background-size: cover;
            background-position: center; margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: Arial, sans-serif; }
        .log-container { background-color: azure; box-shadow: 0 0 10px rgba(0, 0, 0, 0.3); width: 550px; padding: 30px; border-radius: 12px; box-sizing: border-box; max-height: 95vh; overflow-y: auto; }
        .log-header { text-align: center; margin-bottom: 20px; }
        .log-header h2 { font-size: 2rem; color: black; margin: 0; }
        .form-group { margin-bottom: 15px; width: 100%; }
        label { display: block; margin-bottom: 5px; color: black; font-weight: bold; }
        input[type="text"], input[type="number"], select { width: 100%; padding: 12px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        .member-box { border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; border-radius: 5px; background: #f0f8ff; }
        .button { background: blue; color: white; padding: 10px 20px; border: none; border-radius: 5px; font-size: 1rem; width: 100%; cursor: pointer; margin-top: 10px; }
        .button:hover { opacity: 0.9; }
        
        /* FLAT PICKR RED DATES */
        .flatpickr-day.flatpickr-disabled { background: #ffcccc !important; color: #ff0000 !important; text-decoration: line-through; }

        #ticket-view { display: none; padding: 20px; border: 2px dashed #333; background: #fff; margin-top: 20px; }
        .ticket-header { text-align: center; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .ticket-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 1.1rem; }
        .ticket-total { border-top: 2px solid #333; padding-top: 10px; margin-top: 10px; font-size: 1.3rem; text-align: right; color: #d63384; }
        
        @media print {
            body { background: white; }
            .log-container { box-shadow: none; width: 100%; }
            #bookingForm, .log-header h2, .button:not(.print-btn) { display: none !important; }
            #ticket-view { display: block !important; border: 2px solid black; }
        }
    </style>
</head>

<body>
    <div class="log-container">
        <div id="booking-form-container">
            <div class="log-header"><h2>Villa Booking Form</h2></div>
            <form id="bookingForm">
                <div class="form-group">
                    <label>Check-in Date & Time:</label>
                    <input type="text" id="check_in" placeholder="Select check-in" required>
                </div>
                <div class="form-group">
                    <label>Check-out Date & Time:</label>
                    <input type="text" id="check_out" placeholder="Select check-out" required>
                </div>
                <div class="form-group">
                    <label>Number of people:</label>
                    <input type="number" id="num_people" min="1" required>
                </div>
                <div id="member_details_container"></div>
                <div class="form-group">
                    <label>Pet?</label>
                    <input type="radio" name="pet" value="yes" id="py"> <label style="display:inline" for="py">Yes</label>
                    <input type="radio" name="pet" value="no" id="pn" checked> <label style="display:inline" for="pn">No</label>
                </div>
                <div class="form-group">
                    <label>Total Cost:</label>
                    <input type="text" id="total_cost" value="0" readonly>
                </div>
                <div class="form-group">
                    <label>Payment Mode:</label>
                    <select id="payment_method" required>
                        <option value="" disabled selected>-- Select --</option>
                        <option value="UPI">UPI</option>
                        <option value="Credit Card">Credit Card</option>
                        <option value="Net Banking">Net Banking</option>
                    </select>
                </div>
                <button type="submit" class="button">Proceed to Payment</button>
            </form>
        </div>

        <div id="ticket-view">
            <div class="ticket-header">
                <h2>BOOKING CONFIRMED</h2>
                <p>ID: <span id="ticket-id"></span></p>
            </div>
            <div id="ticket-details"></div>
            <div class="ticket-total">PAID: <span id="t-total"></span></div>
            <button class="button print-btn" onclick="window.print()" style="background:#198754">Print Ticket</button>
            <button class="button" onclick="window.location.href='formv.html'" style="background:#6c757d">Back</button>
        </div>
    </div>

    <script>
        // 1. Load confirmed bookings to disable dates
        const confirmedBookings = JSON.parse(localStorage.getItem('confirmed_list')) || [];
        const disabledRanges = confirmedBookings.map(b => ({ from: b.checkIn, to: b.checkOut }));

        const checkInPicker = flatpickr("#check_in", {
            enableTime: true, dateFormat: "Y-m-d H:i", minDate: "today", disable: disabledRanges,
            onChange: (s, d) => { checkOutPicker.set("minDate", d); calc(); }
        });
        const checkOutPicker = flatpickr("#check_out", { 
            enableTime: true, dateFormat: "Y-m-d H:i", disable: disabledRanges, onChange: calc 
        });

        function calc() {
            const p = parseInt(document.getElementById('num_people').value) || 0;
            const cin = new Date(document.getElementById('check_in').value);
            const cout = new Date(document.getElementById('check_out').value);
            if(isNaN(cin) || isNaN(cout)) return;
            
            let rate = 3400;
            if ((cout - cin) / 36e5 > 23.25) rate += 1000;
            const pet = document.querySelector('input[name="pet"]:checked').value === 'yes' ? 1500 : 0;
            document.getElementById('total_cost').value = (p * rate) + pet;
        }

        document.getElementById('num_people').addEventListener('input', function() {
            const container = document.getElementById('member_details_container');
            container.innerHTML = '';
            for(let i=1; i<=this.value; i++) {
                container.innerHTML += `<div class="member-box"><label>Member ${i} Name</label><input type="text" id="m_n_${i}" required><label>Age</label><input type="number" id="m_a_${i}" required></div>`;
            }
            calc();
        });

        // 2. Form Submission (Redirects to payment)
        document.getElementById('bookingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const members = [];
            for(let i=1; i<=document.getElementById('num_people').value; i++) {
                members.push({ name: document.getElementById(`m_n_${i}`).value, age: document.getElementById(`m_a_${i}`).value });
            }

            const pendingData = {
                checkIn: document.getElementById('check_in').value,
                checkOut: document.getElementById('check_out').value,
                people: document.getElementById('num_people').value,
                total: document.getElementById('total_cost').value,
                members: members
            };

            localStorage.setItem('temp_booking', JSON.stringify(pendingData));
            
            const mode = document.getElementById('payment_method').value;
            const fileMap = { 'UPI': 'UPI.html', 'Credit Card': 'Credit Card.html', 'Net Banking': 'netbanking.html' };
            
            // Redirect to the chosen payment file
            window.location.href = `${fileMap[mode]}?returnUrl=formv.html`;
        });

        // 3. Logic to run on page load: Check if returning from a successful payment
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('payment') === 'success') {
                const data = JSON.parse(localStorage.getItem('temp_booking'));
                if (data) {
                    // Officially add to confirmed list so dates turn RED for others
                    confirmedBookings.push(data);
                    localStorage.setItem('confirmed_list', JSON.stringify(confirmedBookings));
                    
                    // Show Ticket
                    document.getElementById('booking-form-container').style.display = 'none';
                    document.getElementById('ticket-view').style.display = 'block';
                    document.getElementById('ticket-id').innerText = '#' + Math.floor(Math.random()*99999);
                    document.getElementById('t-total').innerText = '₹' + data.total;
                    
                    let html = `<p><b>Check-in:</b> ${data.checkIn}</p><p><b>Check-out:</b> ${data.checkOut}</p><hr>`;
                    data.members.forEach((m, i) => html += `<p>Member ${i+1}: ${m.name} (${m.age})</p>`);
                    document.getElementById('ticket-details').innerHTML = html;
                    
                    // Clean up temp data
                    localStorage.removeItem('temp_booking');
                }
            }
        };
    </script>
</body>
</html>
